  <!-- text -->
  <g font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif" fill="#ffffff">
    <text x="408" y="232" font-size="66" font-weight="700" letter-spacing="1">NDL 顔ファインダー</text>
    <text x="412" y="300" font-size="34" font-weight="500" fill="#eaf5ff">NDLデジタルコレクションの「顔」を</text>
