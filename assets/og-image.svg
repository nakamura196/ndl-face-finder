      <stop offset="0" stop-color="#0b8bee"/>
      <stop offset="1" stop-color="#075aa0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle frame -->
  <rect x="28" y="28" width="1144" height="574" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>

  <!-- glyph -->
  <g transform="translate(96 178) scale(4.2)">
    <rect width="64" height="64" rx="14" fill="#ffffff"/>
