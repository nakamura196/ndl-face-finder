<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <h1 data-i18n="brand.title">NDLイメージバンク 顔ファインダー</h1>
    </a>
    <nav class="nav">
      <a href="index.html" data-i18n="nav.home">トップ</a>
      <a href="search.html" class="active" data-i18n="nav.search">検索</a>

      <a href="about.html" data-i18n="nav.about">このサイトについて</a>
    </nav>
    <div class="appbar-right">
      <div class="counts"><span id="result-count">—</span> / <span id="total-count">—</span> <span data-i18n="unit.faces">顔</span></div>
      <button class="icon-btn" data-theme-toggle aria-label="theme">🌓</button>
      <button class="icon-btn" data-lang-toggle aria-label="language">EN</button>
    </div>
  </header>

  <div class="layout">
    <aside class="facets" id="facets">
      <div class="search">
        <input type="search" id="q" data-i18n-attr="placeholder:search.placeholder" placeholder="作品名で検索…" autocomplete="off" />
      </div>
      <div id="facet-groups"><!-- facets injected --></div>
      <button id="clear-facets" class="ghost" data-i18n="search.clear">絞り込みをクリア</button>
    </aside>

    <main class="results">
      <div id="grid" class="grid"><!-- cards injected --></div>
      <p id="empty" class="empty" hidden data-i18n="search.empty">該当する顔がありません。</p>
    </main>

    <aside class="curlist" id="curlist" aria-label="Curation List">
      <h2 data-i18n="search.curList">Curation List</h2>
      <p class="hint" data-i18n="search.curHint">—</p>
      <div id="worklist" class="worklist"><!-- work rows injected --></div>
      <p class="hint tiny" data-i18n="search.bundleNote">—</p>
    </aside>
  </div>
