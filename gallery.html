<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <h1 data-i18n="brand.title">NDLイメージバンク 顔ファインダー</h1>
    </a>
    <nav class="nav">
      <a href="index.html" data-i18n="nav.home">トップ</a>
      <a href="search.html" data-i18n="nav.search">検索</a>
      <a href="gallery.html" class="active" data-i18n="nav.gallery">図版一覧</a>
      <a href="about.html" data-i18n="nav.about">このサイトについて</a>
    </nav>
    <div class="appbar-right">
      <div class="counts"><span id="fig-count">—</span> <span data-i18n="unit.figs">図版</span> / <span id="face-count">—</span> <span data-i18n="unit.faces">顔</span></div>
      <button class="icon-btn" data-theme-toggle aria-label="theme">🌓</button>
      <button class="icon-btn" data-lang-toggle aria-label="language">EN</button>
    </div>
  </header>

  <div class="layout layout--facets-only">
    <aside class="facets" id="facets">
      <div id="facet-groups"><!-- facets injected --></div>
      <button id="clear-facets" class="ghost" data-i18n="search.clear">絞り込みをクリア</button>
    </aside>

    <main class="results">
      <div class="results-bar">
        <label class="g-filter"><span data-i18n="gallery.sort">並び替え</span>
          <select id="sort">
            <option value="faces-desc" data-i18n="sort.facesDesc">顔の多い順</option>
            <option value="faces-asc" data-i18n="sort.facesAsc">顔の少ない順</option>
            <option value="year-asc" data-i18n="sort.yearAsc">年代が古い順</option>
            <option value="year-desc" data-i18n="sort.yearDesc">年代が新しい順</option>
            <option value="default" data-i18n="sort.default">既定(テーマ順)</option>
          </select>
        </label>
        <span class="hint tiny"><span id="result-count">—</span> / <span id="total-figs">—</span> <span data-i18n="unit.figs">図版</span></span>
      </div>
      <div class="gallery" id="gallery"><!-- figure rows injected --></div>
      <p id="empty" class="empty" hidden data-i18n="search.empty">該当する顔がありません。</p>
    </main>
  </div>

  <footer class="foot">
    <span data-i18n="footer.src">出典: 国立国会図書館デジタルコレクション(IIIF / Public Domain Mark)。</span>
    <a href="about.html" data-i18n="common.dataAbout">データについて →</a>
    <a href="privacy.html" data-i18n="nav.privacy">プライバシー</a>
  </footer>

  <script src="vendor/openseadragon/openseadragon.min.js"></script>
  <script src="gallery.js" type="module"></script>
</body>
</html>
